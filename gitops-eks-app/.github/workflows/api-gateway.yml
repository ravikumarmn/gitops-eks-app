name: api-gateway CI

on:
  push:
    branches: [main]
    paths:
      - 'gitops-eks-app/api-gateway/**'

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: api-gateway
  SERVICE_PATH: gitops-eks-app/api-gateway
  GITOPS_REPO: ravikumarmn/gitops-eks-config
  VALUES_PATH: environments/dev/api-gateway/values.yaml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC
      contents: read

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: npm ci --omit=dev

      - name: Run tests
        working-directory: ${{ env.SERVICE_PATH }}
        run: npm test --if-present

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            $SERVICE_PATH
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push image to ECR
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: docker push $IMAGE

      - name: Update image tag in GitOps repo
        env:
          IMAGE_TAG: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          git config --global user.email "ci@github-actions"
          git config --global user.name "GitHub Actions"
          git clone https://x-access-token:${GH_TOKEN}@github.com/${GITOPS_REPO}.git gitops-config
          cd gitops-config
          yq e ".image.tag = \"${IMAGE_TAG}\"" -i ${VALUES_PATH}
          git add ${VALUES_PATH}
          git commit -m "ci: update api-gateway image to ${IMAGE_TAG}"
          git push
